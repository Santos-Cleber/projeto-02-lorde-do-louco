<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorde do louco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

</head>
<body>
    <header class="cabecalho">
        <h1 class="cabecalho__titulo">O Louco</h1>
        <p class="cabecalho__subtitulo">O Insondável | Sequeiro do Louco</p>
    </header>
    <main class="conteudo">
        <img src="images/lord-do-louco.jpg" alt="imagem do personagem o louco do anime lord of mysteries" class="conteudo__imagem">
        <div class="conteudo__poderes">
            <h2 class="poderes__titulo">✦ Poderes</h2>
            <ul class="conteudo__poderes-lista">
                <li class="poder">Controle do Destino</li>
                <li class="poder">Manipulação do Tempo</li>
                <li class="poder">Visão Além do Véu</li>
                <li class="poder">Domínio das Sequências</li>
            </ul>
        </div>
       
    </main>
     <p id="frase"class="frase__mistica">"Acima do bem e do mal, além do destino, o Louco observa tudo em silêncio..."</p>
    
    <script src="script.js"></script>
</body>
</html>
